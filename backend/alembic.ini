# =============================================================================
# Alembic Configuration File
# =============================================================================
# This is the main configuration file for Alembic database migrations.
# It controls how Alembic discovers migration scripts, connects to the
# database, and generates new revision files.
#
# IMPORTANT: The actual database URL is NOT stored here for security reasons.
# Instead, it is set programmatically in env.py from the application's
# pydantic-settings configuration (backend/app/config.py).
# =============================================================================

[alembic]
# Path to the migration environment directory (relative to this file).
# This directory contains env.py, script.py.mako, and the versions/ folder.
script_location = alembic

# Template for migration file names. Uses date/time for chronological ordering,
# the revision hash for uniqueness, and a human-readable slug from the message.
# Example output: 20250115_143022_a1b2c3d4_add_users_table.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(rev)s_%%(slug)s

# Prepend this path to sys.path so that 'app' package imports work correctly
# when running alembic commands from the backend/ directory.
prepend_sys_path = .

# Use UTC timezone for all migration file timestamps to ensure consistency
# across different development environments and deployment regions.
timezone = UTC

# Maximum length of the slug portion in migration filenames.
# Prevents excessively long filenames from verbose migration messages.
truncate_slug_length = 40

# When false, the env.py script is NOT executed during 'alembic revision'.
# Set to true if you need env.py logic (like model imports) during revision creation.
revision_environment = false

# Whether to allow .pyc-only (sourceless) migration files.
# Set to false to require .py source files for all migrations.
sourceless = false

# Separator for version location paths (os = os.pathsep).
version_path_separator = os

# Encoding for generated migration files.
output_encoding = utf-8

# The database URL is set programmatically in env.py from app.config.Settings.
# Do NOT hardcode credentials here. See env.py for details.
# sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Hooks to run after a migration file is generated (e.g., auto-formatting).
# Uncomment below to auto-format with black:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88

# =============================================================================
# Logging Configuration
# =============================================================================
# Controls log output during migration operations.
# Alembic logs at INFO level; SQLAlchemy engine logs at WARN to reduce noise.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
# Set to INFO to see SQL statements emitted during migrations (useful for debugging).
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
# INFO level shows migration steps and revision details during operations.
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
